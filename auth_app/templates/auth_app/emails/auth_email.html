<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ headline }}</title>
</head>
<body style="margin:0; padding:0; background-color:#141414; font-family:Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#141414; padding:40px 0;">
        <tr>
            <td align="center">
                <table width="520" cellpadding="0" cellspacing="0" style="background-color:#1f1f1f; border-radius:16px; padding:40px;">
                    <tr>
                        <td align="center" style="padding-bottom:32px;">
                            <img src="{{ logo_url }}" alt="VideoFlix" width="180" style="display:block;">
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="color:#ffffff; font-size:28px; font-weight:bold; padding-bottom:16px;">
                            {{ headline }}
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="color:#d0d0d0; font-size:16px; line-height:24px; padding-bottom:32px;">
                            {{ message }}
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding-bottom:32px;">
                            <a href="{{ action_url }}" style="background-color:#2e3edf; color:#ffffff; text-decoration:none; padding:14px 28px; border-radius:40px; font-size:16px; font-weight:bold; display:inline-block;">
                                {{ button_text }}
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="color:#8a8a8a; font-size:12px; line-height:18px;">
                            If the button does not work, copy this link into your browser:<br>
                            <span style="color:#bdbdbd;">{{ action_url }}</span>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
